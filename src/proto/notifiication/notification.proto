syntax = "proto3";

package notification;

service NotificationService {
  rpc SendWelcomeEmail (WelcomeEmailRequest) returns (NotificationResponse);
  rpc SendStudentWelcomeEmail (StudentWelcomeEmailRequest) returns (NotificationResponse);
  rpc SendInstructorWelcomeEmail (InstructorWelcomeEmailRequest) returns (NotificationResponse);
  rpc SendEmailVerification (EmailVerificationRequest) returns (NotificationResponse);
  rpc SendLoginAlert (LoginAlertRequest) returns (NotificationResponse);
  rpc SendPasswordReset (PasswordResetRequest) returns (NotificationResponse);
  rpc SendAccountStatusEmail (AccountStatusEmailRequest) returns (NotificationResponse);
  rpc SendSms (SmsRequest) returns (NotificationResponse);
}



message NotificationResponse {
  bool success = 1;
  string message = 2;
  string notification_id = 3;
}



message WelcomeEmailRequest {
  string user_id = 1;
  string email = 2;
  string firstname = 3;
  string role = 4;
}



message StudentWelcomeEmailRequest {
  string user_id = 1;
  string email = 2;
  string firstname = 3;
  string lastname = 4;
  optional string matric_no = 5;
  optional string level = 6;
  optional string department_id = 7;
  optional string department_name = 8;
  optional string course_id = 9;
  optional string course_name = 10;
}



message InstructorWelcomeEmailRequest {
  string user_id = 1;
  string email = 2;
  string firstname = 3;
  string lastname = 4;
  optional string course_id = 5;
  optional string course_name = 6;
  optional string department_id = 7;
  optional string department_name = 8;
}


message EmailVerificationRequest {
  string user_id = 1;
  string email = 2;
  string firstname = 3;
  string verification_code = 4;
  // ↑ CHANGED — was verification_token (UUID link)
  // now verification_code (6 digit code e.g. '483920')
  // notification-service displays this in the email body
  // user reads it and types it on the frontend
  string role = 5;
}



message LoginAlertRequest {
  string user_id = 1;
  string email = 2;
  string ip_address = 3;
  string user_agent = 4;
  string login_time = 5;
  optional string firstname = 6;
}



message PasswordResetRequest {
  string user_id = 1;
  string email = 2;
  string reset_token = 3;
  string firstname = 4;
}



message AccountStatusEmailRequest {
  string user_id = 1;
  string email = 2;
  string firstname = 3;
  bool is_active = 4;
  optional string reason = 5;
}


message SmsRequest {
  string phone_number = 1;
  string message = 2;
  string user_id = 3;
}


