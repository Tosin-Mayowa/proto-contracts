syntax = "proto3";

package auth;

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_STUDENT = 1;
  USER_ROLE_INSTRUCTOR = 2;
  USER_ROLE_ADMIN = 3;
}

service AuthService {
  rpc ValidateToken (ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc Register (RegisterRequest) returns (RegisterResponse);
  rpc RefreshToken (RefreshTokenRequest) returns (RefreshTokenResponse);
  rpc Logout (LogoutRequest) returns (LogoutResponse);
}

message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string email = 3;
  repeated string roles = 4;
}

message LoginRequest {
  string email = 1;
  string password = 2;
  string ip_address = 3;
  string user_agent = 4;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
  UserPayload user = 4;
}





message RegisterRequest {
  
  string firstname = 1;
  string lastname = 2;
  string email = 3;
  string password = 4;


  UserRole role = 5;

  optional string matric_no = 6;

  optional int32 no_of_trials = 7;
 
  optional bool is_active = 8;


  optional string department_id = 9;
 

  optional string course_id = 10;

}

message RegisterResponse {
  string user_id = 1;
  string email = 2;
  string firstname = 3;
  string lastname = 4;
  UserRole role = 5;
  string message = 6;
 
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  string access_token = 1;
  string refresh_token = 2;
  int64 expires_in = 3;
}

message LogoutRequest {
  string user_id = 1;
  string refresh_token = 2;
}

message LogoutResponse {
  bool success = 1;
}

message UserPayload {
  string id = 1;
  string email = 2;
  string firstname = 3;   // ← was first_name
  string lastname = 4;    // ← was last_name
  repeated string roles = 5;
}