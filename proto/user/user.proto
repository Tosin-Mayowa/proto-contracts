syntax = "proto3";

package user;

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_STUDENT = 1;
  USER_ROLE_INSTRUCTOR = 2;
  USER_ROLE_ADMIN = 3;
}

service UserService {
  
  rpc FindById (FindByIdRequest) returns (UserResponse);
  rpc FindByEmail (FindByEmailRequest) returns (UserWithPasswordResponse);
  rpc FindByMatricNo (FindByMatricNoRequest) returns (UserResponse);
  rpc FindByDepartmentId (FindByDepartmentIdRequest) returns (UserListResponse);
  rpc FindByCourseId (FindByCourseIdRequest) returns (UserListResponse);
  rpc FindActiveUsers (FindActiveUsersRequest) returns (UserListResponse);
  rpc FindByRole (FindByRoleRequest) returns (UserListResponse);
  rpc FindByDepartmentAndRole (FindByDepartmentAndRoleRequest) returns (UserListResponse);
  rpc FindByCourseAndRole (FindByCourseAndRoleRequest) returns (UserListResponse);
  rpc CreateUser (CreateUserRequest) returns (UserResponse);
  rpc UpdateUser (UpdateUserRequest) returns (UserResponse);
  rpc DeleteUser (DeleteUserRequest) returns (DeleteUserResponse);
  rpc UpdatePassword (UpdatePasswordRequest) returns (UpdatePasswordResponse);

 
  rpc SaveVerificationCode (SaveVerificationCodeRequest) returns (SaveVerificationCodeResponse);
 

  rpc VerifyEmailCode (VerifyEmailCodeRequest) returns (VerifyEmailCodeResponse);


  rpc MarkEmailVerified (MarkEmailVerifiedRequest) returns (MarkEmailVerifiedResponse);

}



message FindByIdRequest {
  string id = 1;
}

message FindByEmailRequest {
  string email = 1;
}

message FindByMatricNoRequest {
  string matric_no = 1;
}

message FindByDepartmentIdRequest {
  string department_id = 1;
  optional int32 page = 2;
  optional int32 page_size = 3;
}

message FindByCourseIdRequest {
  string course_id = 1;
  optional int32 page = 2;
  optional int32 page_size = 3;
}

message FindActiveUsersRequest {
  bool is_active = 1;
  optional int32 page = 2;
  optional int32 page_size = 3;
}

message FindByRoleRequest {
  string role = 1;
  optional int32 page = 2;
  optional int32 page_size = 3;
}

message FindByDepartmentAndRoleRequest {
  string department_id = 1;
  string role = 2;
  optional int32 page = 3;
  optional int32 page_size = 4;
}

message FindByCourseAndRoleRequest {
  string course_id = 1;
  string role = 2;
  optional int32 page = 3;
  optional int32 page_size = 4;
}

message CreateUserRequest {
  string firstname = 1;
  string lastname = 2;
  string email = 3;
  string password_hash = 4;
  bool is_active = 5;
  string role = 6;
  optional string matric_no = 7;
  optional int32 no_of_trials = 8;
  optional string department_id = 9;
  optional string course_id = 10;
  optional string level = 11;
}

message UpdateUserRequest {
  string id = 1;
  optional string firstname = 2;
  optional string lastname = 3;
  optional string email = 4;
  optional bool is_active = 5;
  optional string role = 6;
  optional string matric_no = 7;
  optional int32 no_of_trials = 8;
  optional string department_id = 9;
  optional string course_id = 10;
  optional string level = 11;
}

message DeleteUserRequest {
  string id = 1;
}

message UpdatePasswordRequest {
  string id = 1;
  string new_password_hash = 2;
}



message SaveVerificationCodeRequest {
  string user_id = 1;
 
  string code = 2;

  string expiry = 3;

}

message VerifyEmailCodeRequest {
  string email = 1;

  string code = 2;
  
}

message MarkEmailVerifiedRequest {
  string user_id = 1;
  
}



message UserResponse {
  string id = 1;
  string firstname = 2;
  string lastname = 3;
  string email = 4;
  string role = 5;
  bool is_active = 6;
  bool email_verified = 7;
 
  optional string matric_no = 8;
  optional int32 no_of_trials = 9;
  optional string department_id = 10;
  optional string course_id = 11;
  optional string level = 12;
  optional string created_at = 13;
}

message UserWithPasswordResponse {
  string id = 1;
  string firstname = 2;
  string lastname = 3;
  string email = 4;
  string password_hash = 5;
  string role = 6;
  bool is_active = 7;
  bool email_verified = 8;
  optional string matric_no = 9;
  optional int32 no_of_trials = 10;
  optional string department_id = 11;
  optional string course_id = 12;
  optional string level = 13;
}

message UserListResponse {
  repeated UserResponse users = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
  int32 total_pages = 5;
}

message DeleteUserResponse {
  bool success = 1;
  string message = 2;
}

message UpdatePasswordResponse {
  bool success = 1;
  string message = 2;
}



message SaveVerificationCodeResponse {
  bool success = 1;
  string message = 2;
}

message VerifyEmailCodeResponse {
  string user_id = 1;
  string email = 2;
 
}

message MarkEmailVerifiedResponse {
  bool success = 1;
  string message = 2;
}